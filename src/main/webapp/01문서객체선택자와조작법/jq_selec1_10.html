<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Insert title here</title>

  <!-- 주제 :  형(이전)요소 선택자 prev()와     동생(다음)요소 선택자 next()   +   이용한 예 
  

 	형(이전)요소 선택자
 	- 선택한 요소를 기준으로 바로 이전형제 요소만 선택하는 선택자  prev()
 	- 문법
 			$("기준요소선택").prev()
 			
 	동생(다음)요소 선택자 
 	- 선택한 요소를 기준으로 바로 다음 형제 요소만 선택하는 선택자  next()  ,  +
 	- 문법
 			$("기준요소선택").next()  
 						또는
 			$("기준요소선택 + 바로다음에 적힌 선택해올 형제요소선택")
   
   -->		
		<!-- jQuery 문법 사용을 위한 CDN 주소 -->
		<script src="https://code.jquery.com/jquery-latest.min.js"></script>	
	</head>
	<body>
		<div id="wrap">
			<h1>인접관계 선택자</h1>
			<p>내용1</p>
			<p class="txt">내용2</p>
			<p>내용3</p>
			<p>내용4</p>
		</div>	
		<script type="text/javascript">
			/*
				객체 2개 생성
				이유 : 각 객체 내부에 css스타일의 속성명:값 을 설정 해 놓고 사용하기 위해 
			*/
			let style_1 = {"background-color":"aqua",   "border":"2px solid red"};
			let style_2 = {"background-color":"yellow",  "border":"2px dotted red"};
			/*
			  	형(이전)요소 선택자
				 	- 선택한 요소를 기준으로 바로 이전형제 요소만 선택하는 선택자  prev()
				 	- 문법
				 			$("기준요소선택").prev()
			
			순서1. $(".txt")        ->  <p class="txt">내용2</p> 기준요소선택 해 오고 
			순서2.$(".txt").prev()  ->  선택한 기준요소를 기준으로 바로 이전에 작성된 이전 <p>내용1</p>요소 최종선택
			*/
			$(".txt").prev().css(style_1);
			/*
		 	동생(다음)요소 선택자 
		 	- 선택한 요소를 기준으로 바로 다음 형제 요소만 선택하는 선택자  next()  ,  +
		 	- 문법
		 			$("기준요소선택").next()  
		 						또는
		 			$("기준요소선택 + 바로다음에 적힌 선택해올 형제요소선택")
			
			순서1. $(".txt")        ->  <p class="txt">내용2</p> 기준요소선택 해 오고 
			순서2. $(".txt").next()  ->  선택한 기준요소를 기준으로 바로 다음에 작성된  <p>내용3</p>요소 최종선택
			*/
			$(".txt").next().css(style_2);
		
			/*
			순서1. $(".txt")     ->  <p class="txt">내용2</p> 기준요소선택 해 오고 
			순서2. $(".txt +")   ->   +  다음요소선택자 기호로 선택한 기준요소 <p>를 기준으로 그다음에 작성된 다음요소를 선택하는데....
			순서3. $(".txt + p") ->   다음요소들 중에서도 바로 다음에 작성된 <p>내용3</p> 요소 한쌍만 최종 선택 
			*/
		    $(".txt + p").css("color","blue");
			
			/*		
			순서1. $(".txt")        ->  <p class="txt">내용2</p> 기준요소선택 해 오고 
			순서2. $(".txt").next()  ->  선택한 기준요소를 기준으로 바로 다음에 작성된 다음 <p>내용3</p>요소를 선택해 오고 
			순서3. $(".txt").next().next() -> <p>내용3</p> 을 기준으로 해서 다음에 작성된 다음 <p>내용4</p>요소를 최종 선택 
			*/
			$(".txt").next().next().css(style_2);
			
		</script>
		
		<div id="wrap">
			<h1>인접관계 선택자</h1>
			<p>내용1</p>
			<p class="txt">내용2</p>
			<p>내용3</p>
			<p>내용4</p>
		</div>	
		
	</body>
</html>
