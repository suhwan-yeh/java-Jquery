<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
	<!-- 
		그외 콘텐츠 탐색 선택자 
		
		contains()
		- 선택한 요소 중 지정한 텍스틑 포함하고 있는 요소만 선택하는 선택자 
		- 문법
			  $("요소들선택:contains(텍스트)")
		
		contents()
		- 선택한 요소의 하위요소중에서 1 깊이의 텍스트와 태그노드를 선택하는 선택자
		- 문법
			  $("요소선택").contents()
		
		has()
		- 선택한 요소 중 지정한 태그를 포함하는 요소만 선택합니다. 
		- 문법
			  $("요소선택:has(요소명)")   /  $("요소선택").has("요소명")
		
		not()
		- 선택한 요소 중 지정한 요소만 제외한 채 요소를 선택하는 선택자.
		- 문법
			  $("요소선택:not(제외할 요소선택)")   /   $("요소선택").not(제외할 요소선택) 
		

		end()
		- 필터링 되기 이전의 선택자가 적용되도록 하는 선택자.
		- 문법 
			   $("요소선택").탐색선택자().end()
	
	 -->

  <script src="https://code.jquery.com/jquery-latest.min.js"></script>
  <script type="text/javascript">
  	$(function(){
 		/* <p><span>내용1</span></p> 최종 선택 
 		
 			순서1.  $("#inner_1 p")   				-> <section id="inner_1">부모요소의 하위 <p>후손요소 모두 선택
 			순서2.  $("#inner_1 p:contains(내용1)")   -> <p>후손요소들 중에서도 '내용1' 텍스트노드가 작성된 <p>요소 최종 선택		
 		*/
 		$("#inner_1 p:contains(내용1)").css("backgroundColor","aqua");
 			
 		/*
 		부모 <div id="outer_wrap"></div> 안에 작성된 후손요소 중에서 1단계 자식요소들 
 		
 			<h1>콘텐츠 탐색 선택자</h1>	
 			<section id="inner_1"></section>
 			<section id="inner_2"></section>  최종 선택
 		*/
 		$("#outer_wrap").contents().css("border","1px solid red");
  	
 		
 		/*
 		  부모 <section id="inner_1"></section> 안에 작성된 모든 p후손요소들 중에서 
 		  :has(strong)  탐색선택자를 작성해  <strong></strong>태그를 가지고 있는 
 		  <p><strong>내용2</strong></p>요소 만 최종 선택
 		*/
 		$("#inner_1 p:has(strong)").css("backgroundColor","red");
 	  //$("#inner_1 p").has("strong").css("backgroundColor","red"); 
 		
 	  
 	  /*
 	  	<section id="inner_2"> 두번째 부모요소를 선택해 
 	  	안에 작성된 모든<p>자식요소들중에서  
 	  	첫번째 <p>를 제외한 나머지( 두번째 <p>내용5</p>, 세번째 <p>내용6</p>)들만 최종 선택
 	  */
 	  $("#inner_2 p:not(:first)").css("backgroundColor","yellow");
 	//$("#inner_2 p").not(":first").css("backgroundColor","yellow");
 	
 	/*
 		순서1. $("#inner_2 p")    ->   <section id="inner_2"> 안에 작성된 모든 <p>자식요소들을 배열에 담아 선택
 		
 				[ <p>내용4</p>,  <p>내용5</p>, <p>내용6</p> ]  <--- 배열 
 				       0             1             2        index
 				       
 		순서2. $("#inner_2 p").eq(2)  -> 	배열의 2 index 위치 칸에 저장된 <p>내용6</p> 최종 선택 하게 되는데..
 		
 		순서3. $("#inner_2 p").eq(2).end()  ->  .end()선택자를 추가로 작성하면 eq(2) 탐색선택자로 선택된거 취소하고 
 												$("#inner_2 p")로 선택한 모든 <p>들을 배열에 담아서 선택한 부분만 적용시켜
 												최종 선택해 옵니다. 모든 <p>의 글자색이 green으로 설정되어 보인다.
 		
 	*/
 	  $("#inner_2 p").eq(2).end().css("color","green");
 	
  	});
  </script>
</head>
<body>
	<div id="outer_wrap">
		<h1>콘텐츠 탐색 선택자</h1>
		<section id="inner_1">
			<h1>contains(), contents(),  has()</h1>
			<p><span>내용1</span></p>
			<p><strong>내용2</strong></p>
			<p><span>내용3</span></p>	
		</section>
		<section id="inner_2">
			<h1>not(), end()</h1>
			<p>내용4</p>
			<p>내용5</p>
			<p>내용6</p>
		</section>
	</div>
</body>
</html>
