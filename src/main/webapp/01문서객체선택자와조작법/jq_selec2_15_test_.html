<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title> 탐색 선택자 </title>  
	<!-- 
		속성 탐색자와 함께 알아두면 유용한 메소드 
		
		is()
		
		 - 선택한 요소의 상태가 지정한 속성과 일치하면 true반환, 그렇지않으면 false반환 하는 메소드 
		 - 입력요소의 체크박스나 선택상자의 선택 여부 또는 숨겨져 있는 상태의 여부를 조건식으로 작성할때 사용되는 메소드 
		 - 문법
		 	
		 	$("요소선택").is(:checked 또는 :selected 또는 :visible 또는 :hidden 또는 :animated)
		 	
		 	의미 :  요소선택.is(:checked) -> 선택한 요소(체크박스)가 체크되어 있으면 true반환 아니면 false 반환 메소드
		 							  -> 선택한 요소(라디오버튼)가 체크되어 있으면 true반환 아니면 false 반환 메소드 
		 		 
		 		    요소선택.is(:selected) -> 선택한 Option요소가 선택되어 있으면 true반환 아니면 false를 반환 메소드 
	
	 -->
	<script src="http://code.jquery.com/jquery-latest.min.js"></script>
	<script>
	$(function(){
		/*
		<section id="inner_1">
			<h2>문단 태그 영역</h2>
			<p>내용1</p>
			<p style="display:none;">내용2</p>
		</section>
		첫번쨰 이 요소 내부에 만들어져 있는 두 자식<p>요소 두쌍을 모두 배열에 담아 선택해 옵니다.	
		
		[<p>내용1</p>, <p style="display:none;">내용2</p>]   <-- 배열 
		      0                             1               index
		*/		
		let result_1 = $("#inner_1 p");
		
		/* <p style="display:none;">내용2</p> 요소를 선택해 
		   이요소가 웹브라우저 화면에 보이고 있는 상태이냐 라고 물어볼때 is(":visible") 메소드 호출하여  
		   웹브라우저 화면에 보이고 있는 상태이면? is메소드는 true반환 하고, 보이지 않으면? false를 반환 합니다.
		*/
		console.log(  result_1.eq(1).is(":visible")  ); // false
		
		/*
			<input type="checkbox" id="chk1" checked> 체크1  요소를 선택해서 
			체크되어 있는 상태 이냐? 라고 컴퓨터에게 물어 보자.
		*/
		if( $("#chk1").is(":checked")){
			
			/* <h2>폼 태그 영역</h2> 요소를 선택하여 배경색을 분홍색으로 설정 */
			$("#inner_2 h2").css("backgroundColor","pink");
			
		//<input type="checkbox"  id="chk2" > 체크2 요소 선택해서 체크된 상태 이냐?	
		}else if( $("#chk2").is(":checked") ){
			
			/* <h2>폼 태그 영역</h2> 요소를 선택하여 배경색을 파랑색으로 설정 */
			$("#inner_2 h2").css("backgroundColor","blue");
		}	
			
		//=====================================================================
			
		/*
		  순서1. 아래의 작성된 2개의 모든 체크박스를 모두 배열에 담아 선택해 온다.
			
		  		[ <input type="checkbox" id="chk1" checked>,    <--- 0 index
		  		  <input type="checkbox" id="chk2">         ]   <--- 1 index
		  
		  코드 
		  		$("input[type=checkbox]")
		
		  순서2. each(function(index, object){});  메소드를 사용하여 배열에 저장된 2개의 모든 체크박스를 
		        반복해서 차례대로 얻어서 하나라도 "체크 되어 있는 상태이면?"
		        <h2>폼 태그 영역</h2> 요소를 선택해 글자색상을 빨강으로 설정되게 하자.
		  		
		  코드2.  $("input[type=checkbox]").each(function(index, object){});      
		*/
		 $("input[type=checkbox]").each(function(index, object){
			 
			 	//체크 되어 있는 상태이냐?
			 	if( $(object).is(":checked") ){
			 		
			 		 //<h2>폼 태그 영역</h2> 요소를 선택해 글자색상을 빨강으로 설정되게 하자.
			 		 $("#inner_2 h2").css("color","red");
			 	}		
			 
		 });
		/*
	  		[ <input type="checkbox" id="chk1" checked>,    <--- 0 index
	  		  <input type="checkbox" id="chk2">         ]   <--- 1 index
		*/
	});  
	</script>
</head>
<body>
	<div id="outer_wrap">
		<h1>is( )</h1>
		<section id="inner_1">
			<h2>문단 태그 영역</h2>
			<p>내용1</p>
			<p style="display:none;">내용2</p>
		</section>
		
		<section id="inner_2">
			<h2>폼 태그 영역</h2>
			<p>
				<input type="checkbox" name="chk1" id="chk1" checked>
				<label for="chk1">체크1</label>

				<input type="checkbox" name="chk2" id="chk2" >
				<label for="chk2">체크2</label>           
			</p>
		</section>
	</div>
</body>
</html>
