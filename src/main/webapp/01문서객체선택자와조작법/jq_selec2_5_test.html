<!DOCTYPE html>
<html lang="ko">
	<head>
		<meta charset="UTF-8">
		<title> 선택자 </title>  
		<!-- 
				탐색선택자 중에서  위치탐색 선택자  
		
				종류   ->  nth-child(숫자) 또는 nth-child(숫자n)  , nth-last-of-type(숫자)   선택자 
				
				
				nth-child(숫자)
					- 선택한 요소들 중에서  지정한 숫자에 위치한 요소를 선택
					- 문법
						 $("요소들선택:nth-child(숫자)")
						 
				nth-child(숫자n)
					- 선택한 요소들 중에서 지정한 숫자배수에 위치한 요소를 선택 
					- 문법
						 $("요소들선택:nth-child(숫자n)") 
				
				nth-last-of-type(숫자)
					- 선택한 요소들 중에서 마지막 위치에서 ~~~ 
					  거꾸로 탐색을 하는데  지정한 숫자만큼 거꾸로 탐색한 최종 요소를 선택
					- 문법
						 $("요소들선택:nth-last-of-type(숫자)")
		
		 -->
		<script src="http://code.jquery.com/jquery-latest.min.js"></script>
		
		<script>
		$(function(){
			
			/*
				순서1. $("#menu1 li")  -> id="menu1" 작성된 부모 <ul id="menu1">내부의 모든 후손 <li>요소들을 배열에 담아 선택
				순서2. $("#menu1 li:nth-child(1)"
				       -> 배열에 저장된 모든 후손 <li>요소들 중에서도 
				          첫번째 <li>내용1-1</li> 만 최종 선택 
			*/
			//코드1. 
			$("#menu1 li:nth-child(1)").css("background-color","red");
				          
			/*
			순서1. $("#menu1 li")  -> id="menu1" 작성된 부모 <ul id="menu1">내부의 모든 후손 <li>요소들을 배열에 담아 선택
			순서2. $("#menu1 li:nth-child(2n)"
			       -> 배열에 저장된 모든 후손 <li>요소들 중에서도 
			          2n 을 넣어 2의 배수 번째에 작성되어 있는 2번째 , 4번째 <li>요소들만 최종 선택해 옴
			       -> 최종 선택한 li들 :  <li>내용1-2</li> , <li>내용1-4</li>
			*/
			//코드2.
			$("#menu1 li:nth-child(2n)").css("background-color","pink");
			
			/*
			 순서1. $("#menu2 li")  -> id="menu2" 작성된 부모 <ul id="menu2">내부의 모든 후손 <li>요소들을 배열에 담아 선택  
			 순서2. $("#menu2 li:nth-last-of-type(1)")
			 		-> :nth-last-of-type(1) 위치탐색선택자를 이용해 전달한 숫자1 을 사용하면
			 		   거꾸로 작성된 위치를 세어 <li>내용2-2</li>를 최종 하나 선택
			 */
			//코드3.
			$("#menu2 li:nth-last-of-type(1)").css("background-color","blue");

		});
		</script>
	</head>
	<body>
			<h1>탐색 선택자</h1>
			<ul id="menu1">
				<li>내용1-1</li>
				<li>내용1-2</li>
				<li>내용1-3</li>
				<li>내용1-4</li>
			</ul>
			<ul id="menu2">
				<li>내용2-1</li>
				<li>내용2-2</li>
				<li>내용2-3</li>
			</ul>
	</body>
</html>
