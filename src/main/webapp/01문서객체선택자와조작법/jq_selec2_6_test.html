<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title> 선택자 </title>  

<!-- 
	탐색선택자 중에서  위치탐색 선택자  
	
		종류 ->  only-child ,  slice(index) 선택자
		
		
		only-child
			-  요소들을 먼저 선택하고 
			   선택한 요소가  부모요소에 하나뿐인 자식요소인 경우에만 선택하는 선택자
			- 문법
				 $("요소들선택:only-child")
				 
		slice(startIndex, endIndex)
			-  요소들을 먼저 선택하고 선택한 요소들 중에서  
			    index위치로 지정 구간 index위치에 저장된 요소들을 선택하는 선택자
			- 문법
				 $("요소들선택").slice(startIndex, endIndex)			 
			    예)		      .slice(1,           3)   
			  				 ->  1 이상  3미만  index에 위치한 요소들을 선택함. 
 -->



<script src="http://code.jquery.com/jquery-latest.min.js"></script>
<script>
$(function(){
	
	/*
		순서1. $("#menu1 li")               -> <ul id="menu1">..</ul> 내부에 작성된 모든 <li>들을 배열에 담아 선택해 오는데
		순서2. $("#menu1 li").slice(1,  3)  ->  slice메소드를 이용해 전달한 1 index 부터 2 index 위치 칸에 저장된
											   <li>내용1-2</li> 와 <li>내용1-3</li> 두개만 최종 선택 
	*/
	//코드1. 
	$("#menu1 li").slice(1,  3).css("background-color","red");
					
	/*										   
		순서1.  $("li")  		   ->  모든 <li>들을 배열에 담아 몽땅 선택해 오는데
		순서2.  $("li:only-child")  ->  그중에서도 부모<ul>요소사이에 하나만작성된 자식요소이면? 최종 <li>내용2-1</li> 선택
	*/
	//코드2.
	$("li:only-child").css("background-color","blue");
	
});
</script>
</head>
<body>
	<h1>탐색 선택자</h1>
	<ul id="menu1">
			<li>내용1-1</li>   <!--  0  -->
			<li>내용1-2</li>	  <!--  1 -->
			<li>내용1-3</li>   <!--  2 -->
			<li>내용1-4</li>   <!--  3 -->
	</ul>
	<ul id="menu2">
		<li>내용2-1</li>
	</ul>
</body>
</html>
