<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Insert title here</title>
		
		
		<!-- JQuery 문법 사용을 위한 CDN 주소  -->
		<script src="https://code.jquery.com/jquery-latest.min.js"></script>
		
		<style>
			body { font-family: sans-serif; }
			ul   { list-style: none;   }
			.item {  padding: 6px; margin: 6px; }
			.badge { color:#c0392b; }
			.price::after {content:"원";}
		</style>
		
	</head>
	<body>
		<h1>조선 K-뷰티 상품관</h1>
		
		<div id="shop">
			<section class="category">
				<h2 class="cat-title">스킨케어</h2>
				<ul>
					<li class="item best">
						<span class="name">조선 선크림</span>
						<span class="price">15000</span>
						<span class="badge">BEST</span>
					</li>
					<li class="item">
						<span class="name">한방 토너</span>
						<span class="price">22000</span>
					</li>				
				</ul>
			</section>
			<section class="category">
				<h2 class="cat-title">메이크업</h2>
				<ul>
					<li class="item best">
						<span class="name">궁중 립밥</span>
						<span class="price">18000</span>
						<span class="badge">BEST</span>
					</li>
					<li class="item soldout">
						<span class="name">단청 아이섀도</span>
						<span class="price">27000</span>
					</li>				
				</ul>
			</section>		
		</div>
	
		<script type="text/javascript">
		
			$(function(){
				/*
					[요소명 선택자]
					->  $("요소명")  :  해당 요소 전부 선택 
				*/
				//1. 모든 <h2> 선택  -> 제목 색 갈색 
				$("h2").css("color","#8b4513");
				
				/*
					[종속 선택자]
					-> $("요소명.class값")  : 요소 중 class값과 일치하는 요소 최종 선택				
				*/
				//2. <li> 중 class="best" 인것만 선택 -> 취소선 설정 
				$("li.best").css("text-decoration", "line-through");
				
				//3. <li> 중 class="soldout" 인것만 선택 -> 배경 연노랑 설정 
				$("li.soldout").css("background-color", "#fff8e1");
				
				
				/*
					[그룹 선택자 ,]
					-> $("선택자1, 선택자2")   :  여러 선택자1 선택자2 작성방법으로 여러요소 다중 선택 
				*/
				//4. 배지  +  제목 과 함께 선택 -> 굵게 설정
				$(".badge, .cat-title").css("font-weight","bold");
				
				/*
					[아이디 선택자 #]
					-> $("#아이디값")   :  id 일치 요소 1개 선택 
				*/
				//5. <div id="shop">...</div> 선택 -> 전체 바깥테두리 선 설정 
				$("#shop").css("border","3px double #4b0082");
					
				
			});
		
		
		
		</script>
	
	
	
	</body>
</html>
