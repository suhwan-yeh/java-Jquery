<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
	<!-- 
		 객체 조작 메소드 종류 중에서 속성조작메소드
		 	 
		 	html()
		 	- 1.선택한 요소의 하위요소를 가져와 문자열로 변환을 시켜 얻을 떄 사용하는 메소드 
		 	- 문법
		 		  $("요소선택").html();
		 		  
		 		  
			- 2. 선택한 요소의 하위요소를 전부제거하고 대신에 동적으로 생성한 html요소를 추가시키는 메소드
			- 문법
				  $("요소선택").html("동적으로 새 요소생성해서 넣자");
				  	
				  	
			text()
			- 1. 선택한 요소의 하위텍스트만 가져와 문자열로 변환을 시켜 얻을때 사용하는 메소드
			- 문법
				 $("요소선택").text();
							 
			- 2. 선택한 요소의 하위요소를 전부제거하고 대신에 동적으로 생성한 텍스트노드를 추가시키는 메소드 
			- 문법
				 $("요소선택").text("동적으로 새 텍스트 생성");
			 	
	 -->
  <script src="https://code.jquery.com/jquery-latest.min.js"></script>
  <script type="text/javascript">
  	$(function(){

  		/* 설명.  id="sec_1" 작성된 <section id="sec_1">요소를 먼저 선택하고
  		         .html(); 메소드를 호출하면 하위요소들을 한쌍의 문자열로 얻을수 있습니다.*/
		let result_1 = $("#sec_1").html();
		console.log(result_1);
		/* 
			"<h2><em>html()</em></h2>
			<p>내용1</p>"	
		*/
		//================================================================
			
  		/* 설명.  id="sec_1" 작성된 <section id="sec_1">요소를 먼저 선택하고
  		         빈공백 p를 작성해서 하위 <p>내용1</p>요소를 최종 선택해서 
  		    	 .html("<a href='#'>Text1</a>"); 메소드를 호출하면 
  		    	 하위 <p>내용1</p>요소에 작성된 "내용1"을 제거하고 
  		    	 대신 "<a href='#'>Text1</a>" 추가한다.
  		*/         
		$("#sec_1 p").html("<a href='#'>Text1</a>");	
		/*
		수정전 
			 <section id="sec_1">
				<h2><em>html()</em></h2>
				<p>내용1</p>   
			 </section>
	
		수정후 
			 <section id="sec_1">
				<h2><em>html()</em></h2>
				<p><a href='#'>Text1</a></p>  <------ 이영역 수정되었음 
		 	</section>					
		*/	
		//================================================================

		/*	설명.
		    <h2><em>텍스트()</em></h2> 요소를 선택해서 가져와 
			text메소드를 이용하여  <em>텍스트()</em> 요소를 제거하고
			"설정할텍스트" 를 넣는다.
		*/
		$("#sec_2 h2").text("설정할텍스트");		
		/*
		  수정 전 
			<section id="sec_2">
				<h2><em>텍스트()</em></h2>  <----- 수정전 <em>텍스트()</em>은 작성 되어 있음 
				<p>내용2</p>
			</section>
		  
		  수정 후
			<section id="sec_2">
				<h2>설정할텍스트</h2>  <----- 수정후 <em>텍스트()</em> 제거 하고 "설정할텍스트" 추가됨  
				<p>내용2</p>
			</section>		  
		*/
		//=====================================================================
		/* 설명. 
			<p>내용2</p>요소 선택후 .text()메소드를 호출하면
			"내용2" 텍스트 노드를 얻을수 있다.
		*/			
		let result = $("#sec_2>p").text();	
		console.log(result); //"내용2"
  	}); 
  </script> 
</head>
<body>
	<h1><strong>객체 조작 및 생성</strong></h1>
	<section id="sec_1">
		<h2><em>html()</em></h2>
		<p>내용1</p>
	</section>
	<section id="sec_2">
		<h2><em>텍스트()</em></h2>
		<p>내용2</p>
	</section>
</body>
</html>
