<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="ko" xml:lang="ko">
<head>
<meta http-equiv="content-type" content="text/html; charset=utf-8" />
<title> 객체 조작 및 생성 </title>

<script src="http://code.jquery.com/jquery-latest.min.js"></script>

<script type="text/javascript">
//<![CDATA[
$(function(){	
	/*
	  도전 미션1. 모든 li들을 배열에 담아 선택해 오는데....
	  			li들 중에서도 ul부모요소의 첫번째 li요소를 제외한  
	  			두번째,세번째,네번째 모든 li요소들에만  배경색을 노란색으로 설정
					  			<li>내용2</li>  
					  			<li>내용3</li> 
					  			<li>내용4</li>  
	*/
	//방법1. $("li").not(":eq(0)").css("backgroundColor","yellow");
	
	//방법2.
	$("#myList li:not(:first)").css("backgroundColor","yellow");			
	
});
//]]>
</script>
</head>
<body>
 	<ul id="myList">
 		<li>내용1</li>  <!--  0 index -->
 		<li>내용2</li>  <!--  1 index -->
 		<li>내용3</li>  <!--  2 index -->
 		<li>내용4</li>  <!--  3 index -->
 	</ul>
 
 
 
</body>
</html>
