<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="ko" xml:lang="ko">
<head>
<meta http-equiv="content-type" content="text/html; charset=utf-8" />
<title> 객체 조작 및 생성 </title>

<script src="http://code.jquery.com/jquery-latest.min.js"></script>

<script type="text/javascript">

	$(function(){
		/* 도전 미션2. <li>내용3</li> 선택해서 가져와 
		             바깥 테두리 선 굵기 1px, 가는 실선, 노란색 선으로 설정 */
		//방법1.
		//$("#myList li:contains('내용3')").css("border","1px solid yellow");
	
		//방법2. eq(2) 를 사용하여 세번 째 <li>내용3</li> 요소 선택
		//$("#myList li").eq(2).css("border","1px solid yellow");
		
		//방법3. each() 메소드를 사용하여 모든 <li>을 배열에 담아 순회 하면서 
		//      컨텐츠 영역에 "내용3" 텍스트를 가진 세번쨰 <li>내용3</li> 요소에만 
		//      바깥 테두리 선 굵기 1px, 가는 실선, 노란색 선으로 설정
		/*
			  [
				 0 	<li>내용1</li>,
				 1 	<li>내용2</li>,
				 2 	<li>내용3</li>,
				 3 	<li>내용4</li>,
			  ]
		*/
			$("#myList li").each(function(){
							
				   if( $(this).text() == "내용3" ){
					   
					 //$(<li>내용3</li>).css("backgroundColor","aqua");
					            $(this).css("border","1px solid yellow");
				   } 			
			});
		
		
		
	});
</script>
</head>
<body>
	<ul id="myList">
	  <li>내용1</li>
	  <li>내용2</li>
	  <li>내용3</li>
	  <li>내용4</li>
	</ul>
</body>
</html>
