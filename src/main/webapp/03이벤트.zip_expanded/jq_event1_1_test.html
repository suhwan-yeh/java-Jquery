<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>

	<!-- 제이쿼리 설치 -->
	<script src="http://code.jquery.com/jquery-latest.min.js"></script>
	<script>
		$(function(){
			/*
				단독 이벤트 등록 메소드 종류중에서  - click 메소드 사용
				
				작성 방법
						  $("이벤트 등록대상요소 선택").click(function(){
							  
							  사이트이용자가 click이벤트를 발생시키면 처리할 코드;
							  
						  });		
			*/
			//1. <button class="btn1">버튼1</button> 요소 선택 후 
			//   click 단독 이벤트 등록메소드로  click 이벤트(동작)를 등록하고
			//   만약 사이트 이용자가 해당 "버튼1"을 click 하는 이벤트(동작)을 하면  
			//   이벤트핸들러함수 function가 click이벤트를 처리하게 정의   
			
				$(".btn1").click(function(){
					
					//2. click 이벤트가 발생하면 처리할 코드 작성
					//-> <p>내용1</p> 요소를 선택하여  글자색상을 빨강으로 설정 
					$("p:eq(1)").css("color","red");
					
				});	
			//==============================================================================
				
			/*
					그룹 이벤트 등록 메소드 - on() 사용 
					
					 - 하나 이상의 이벤트를 선택한요소에 다중 등록 후 그룹으로 이벤트 처리 
					 
					 - on() 메소드를 이용해 하나이상의 이벤트를 선택한요소에 이벤트 다중 등록 기본문법3 ******
					 
					 	 $("등록한 이벤트 대상 요소 선택").on({
					 		 								"등록할_이벤트종류1 등록할_이벤트종류2" : function(){ 처리코드 },
					 		 								
					 		 								"등록할_이벤트종류3 등록할_이벤트종류4" : function(){ 처리코드 }
					 		 							
					 	 								});					 	
			*/
					 //1.<button class="btn2">버튼2</button> 	요소를 선택해
					 
					 //  mouseover 이벤트 : 마우스 포인터를 올리는 (이벤트)동작  등록,
					 //  focus     이벤트 : 포커스를 강제로 가하는 (이벤트)동작  등록    
					 //===== 둘중 하나의 이벤트가 발생하면 => 이벤트핸들러 함수 fucntion(){}에서 처리하게 정의 
					 
					 //  mouseout  이벤트  : 마우스 포인터가 요소에 올라가 있다가 내리는 (이벤트)동작 등록,
					 //  blur      이벤트  :  포커스를 다른요소로 이동 시키는 (이벤트)동작 등록
					 //===== 둘중 하나의 이벤트가 발생하면 => 이벤트핸들러 함수 fucntion(){}에서 처리하게 정의 
					 
					 $("[class=btn2]").on({
						 					 "mouseover focus"  :  function(){			
						 						 
						 						 /*위 등록한 두개의 이벤트중 하나가 발생하면 처리할 코드작성 */
						 						 //-> <p>내용2</p> 요소 선택 후 "내용2" 글자색깔을 파란색으로 설정
						 						 $("p:eq(3)").css("color","blue");
						 					 },
						 					 
						 					 "mouseout blur"    :  function(){
						 						 			 
						 						 /*위 등록한 두개의 이벤트중 하나가 발생하면 처리할 코드작성 */
						 						 //-> <p>내용2</p> 요소 선택 후 "내용2" 글자색깔을 아쿠아색으로 설정
						 						 $("p:eq(3)").css("color","aqua");
						 					 }					 					 
						 
					 					  });
		//================================================================================================
			/*
				 그룹 이벤트 등록 메소드  -  on() 사용
				 
				 - 하나이상의 이벤트를 선택한요소에 한꺼번에 다중 등록 후 등록한 이벤트중 하나가 발생하면 한번만 이벤트처리 
				 
				 - on() 그룹이벤트 등록 메소드를 이용해 이벤트를 하나이상 등록하는 *** 기본문법1 *****************
				 
				 	
				 		$("등록할이벤트대상요소선택").on("이벤트종류1 이벤트종류2 이벤트종류3",function(){
				 			
				 			등록한 이벤트종류1 또는 이벤트종류2 또는 이벤트종류3 중에 하나의 이벤트가 발생하면
				 			이벤트 처리 코드 작성;
				 			
				 		});
			
			*/
			//2. <button class="btn3">버튼3</button> 요소를 선택해서 가져와
			//   "click"  "mouseover"  "focus" 이벤트종류 3개를 다중 등록 후 
			//    이벤트 종류 3개 중에 하나의 이벤트가 발생하면 한번만 이벤트처리 하는 코드 작성
			$(".btn3").on("click mouseover focus", function(){
				
				//<body></body>요소를 선택해 배경색을 green으로 설정
				$("body").css("backgroundColor","green");
				
				//<p>내용3</p>요소를 선택해  "내용3" 글자를 "내용"으로 변경
				$("p:eq(5)").text("내용");
			});
				
		});	
	</script>
</head>
<body>
	<p>
		<button class="btn1">버튼1</button>
	</p>
	<p>내용1</p>
	<p>
		<button class="btn2">버튼2</button>
	</p>
	<p>내용2</p>
	<p>
		<button class="btn3">버튼3</button>
	</p>
	<p>내용3</p>	



</body>
</html>
