<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>

	<!-- 제이쿼리 설치 -->
	<script src="http://code.jquery.com/jquery-latest.min.js"></script>

</head>
<body>
	<p><img src="https://image.utoimage.com/preview/cp872722/2022/12/202212008462_500.jpg"></p>
	
	<script type="text/javascript">
		/*
			단독이벤트 등록 메소드 종류중에서  로딩이벤트등록메소드 2개  ready(), load() 이벤트 등록메소드
			
				ready()
				-         사용자  웹브라우저 주소창에 요청할 HTML문서 사이트 주소를 입력 후 엔터를 눌러 웹서버에 주소 요청을 했을때
			              요청한 HTML문서(document문서객체) 내부에 있는 모든 HTML태그(DOM)을
			              웹브라우저가 읽어들인 동작(이벤트)을 등록하는 메소드 
				            
			              
			    - 문법
		            		$(document).ready(function(){ 이벤트처리코드작성;   });
						
							$(document).on("ready",function(){ 이벤트처리코드작성;  });   <--- 같은의미 
		
							$(function(){}); <--- 같은의미
							
							Jquery(document).ready(function(){ 이벤트처리코드작성;  }); <--- 같은의미
							
		*/	

		
		
		
		
		
		/*
			load()
			- 외부 사이트 문서를 웹브라우저가 읽어들이는 동작(이벤트)를  window객체(창)에 등록하는 메소드
			- 문법
				  $(window).load(function(){  이벤트 처리코드 작성;      });
		
				  $(window).on("load",function(){  이벤트 처리코드 작성;  });
		*/	
		
	</script>



</body>
</html>
