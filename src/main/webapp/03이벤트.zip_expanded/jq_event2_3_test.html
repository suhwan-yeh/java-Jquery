<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title> 이벤트 </title>
	<!-- 
		change() 이벤트 등록 메소드
		
		- 선택한 폼요소의 value속성값을  새로운 값으로 변경시 사용하는 메소드이고,
		  포커스가 다른 요소로 이동하는 이벤트를 등록하는 메소드 입니다.
		- 선택상자 <select> <option>요소에 이벤트를 등록하는 메소드 입니다.
		
		- 문법
				$("이벤트대상요소선택").change(function(){ 이벤트 처리코드; });
				$("이벤트대상요소선택").on("change", function(){ 이벤트 처리코드; });
	
				$("이벤트대상요소선택").change();   <- 강제로 <option>을 선택 할수 있게 합니다. 
	 -->
	<script src="http://code.jquery.com/jquery-latest.min.js"></script>
	<script>
	$(function(){
		
		//첫번째 <select id="rel"></select>요소 선택해서 
		//여러 <option>들 중에서 하나를 선택한 동작(change이벤트) 등록 
		$("#rel").on("change",function(){
			
			//$(this) ->  <option>들 중에서 사이트 이용자가 선택한 <option>하나를 선택 
			
			//선택한 <option>의  value속성값 얻기 
			let selectedOption  = $(this).val();
			
			//<p class="txt"></p> 요소 선택 해서 콘텐츠영역에 넣어 보여주기
			$(".txt").text(selectedOption); //국어 -> k   ,  영어 -> e ,  수학 -> m 
			
		});
		
		//두번쨰 <select id="rel_site"></select> 요소를 선택
		//.val("값") 형태로 메소드 호출 구문을 작성하면  값이   "www.daum.net" 인  <option>을 선택해서 가져와
		// 강제로 선택한 상태의 화면을 보여주기 위해 change()메소드 호출 구문을 작성하자!		
		$("#rel_site").val("www.daum.net").change();		
	});
	</script>
</head>
<body>
	<select id="rel">
		<option>과목선택</option>
		<option value="k">국어</option>
		<option value="e">영어</option>
		<option value="m">수학</option>
	</select>
	<select id="rel_site">
		<option value="">사이트 선택</option>
		<option value="www.google.com">구글</option>
		<option value="www.naver.com">네이버</option>
		<option value="www.daum.net">다음</option>
	</select>
	<p class="txt"></p>
</body>
</html>
