<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title> 이벤트 </title>  
	
	<!-- 
		이벤트 제거 메소드
		 - 선택한 요소에 등록된 이벤트를 제거 하는 메소드.
		 - 종류
		 		off() - on()메소드로 등록한 이벤트종류를 요소에서 제거하는 메소드
		 		
		 		문법1. 기본이벤트가 등록되었을때 
		 			 $("이벤트제거대상요소선택").off("제거할이벤트종류명");
		 			 
		 		문법2. 라이브이벤트가 등록되었을때 	 
					 $(document 또는 "이벤트제거대상요소의상위요소선택").off("제거할이벤트종류명","제거할 이벤트대상요소선택");
					 
					 
					 
				unbind() - bind()메소드로 등록한 이벤트종류를 요소에서 제거 하는 메소드
				문법
					$("이벤트제거대상요소선택").unbind("제거할이벤트종류명");
				
				
				
				undelegate() - deleage()메소드로 등록한 이벤트종류를 요소에서 제거 하는 메소드	 
				
				문법1. 기본이벤트가 등록되었을때
					  $("이벤트제거 대상요소선택").deleage("제거할이벤트종류명");
				
				문법2. 라이브 이벤트가 등록되었을때
					  $(document 또는"이벤트제거대상요소의 상위요소선택").undelegate("제거할이벤트가 등록된 대상요소선택","제거할이벤트종류명");		
				
					 
	 -->


	<script src="http://code.jquery.com/jquery-latest.min.js"></script>
	<script>
	$(function(){
	//주제 : on메소드를 이용해 '기본이벤트 등록방식'과 '라이브 이벤트 등록 방식'을 사용해 각각의 버튼에 이벤트를 등록하자.
				
	    //1.기본이벤트 등록방식이란? HTML문서에 미리 작성되어 있는 요소를 선택해서 이벤트를 등록하는 방식
				
	    	//<button class="btn_1">버튼1</button>요소를 선택해서 mouseover 이벤트 등록
	    	$(".btn_1").on("mouseover", function(){   alert('Hello!');     });
	    	
	    			
		//2.기본이벤트 등록 제거 ? 등록한 기본이벤트 삭제
			
	    	//<button class="del_1">버튼1 이벤트 해지</button> 요소를 선택해서 click 이벤트 등록 
	    	$(".del_1").on("click", function(){
	    		
	    		//<button class="btn_1">버튼1</button>요소를 선택해서 등록된 "mouseover"이벤트를 요소에서 제거 
	    		$(".btn_1").off("mouseover");
	    		
	    		
	    	});
			
	
			//-------------------------------------------------------------------------------
			
			
			//<p><button class='btn_2'>버튼2</button></p> 동적으로 생성해서 <div></div>요소 사이에 추가 
			$("#wrap").append("<p><button class='btn_2'>버튼2</button></p>");
			
		//라이브 이벤트 등록 방식? 동적으로 생성된 요소에 on메소드로 이벤트를 등록하는 방식
			//<p><button class='btn_2'>버튼2</button></p>  동적으로 생성된 요소에 mouseover 이벤트 등록
			$(document).on("mouseover",".btn_2", function(){

				 alert("WELCOME!");
			
			});
			
			//<button class="del_2">버튼2 이벤트 해지</button> 요소를 선택해서 click이벤트 등록!
			$(".del_2").on("click", function(){

				//라이브 이벤트 등록 방식 on()메소드를 사용해 등록된 "mouseover"이벤트 제거 
				$(document).off("mouseover",".btn_2");
			
			});	
	

	});
	</script>
</head>
<body>
	<div id="wrap">
		<p><button class="btn_1">버튼1</button></p>
	<!-- <p><button class='btn_2'>버튼2</button></p>  동적으로 생성된 요소에 mouseover 이벤트가 등록되어 있음--> 
	
		<p>
			<button class="del_1">버튼1 이벤트 해지</button> 
			<button class="del_2">버튼2 이벤트 해지</button>
		</p>
	</div>
</body>
</html>
