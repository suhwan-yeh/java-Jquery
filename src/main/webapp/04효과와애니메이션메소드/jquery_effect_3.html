<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>

	<style>
		 h1{ width: 50px;   height: 30px;   background-color: red;  font-size: 100%; }
	</style>

	<script src="http://code.jquery.com/jquery-latest.min.js"></script>
	<script type="text/javascript">
		//웹브라우저가 jquery_effect_3.html파일 내부에 작성된 모든 HTML태그들을 읽어들이는 동작(로딩동작)
		//을 jquery_effect_3.html파일에 등록하는 행위(ready이벤트 등록)
		$(document).ready(function(){			
/*			
			//1. <button id="btn1">fadeOut</button> 요소를 선택해서 'click' 이벤트 등록하고 
			//   'click' 이벤트가 발생하면  <h1>내용</h1>요소를 선택해서 1초만에 점점 투명해 지면서 숨겨지게 하는 효과 적용
			//참고. fadeOut메소드 사용			
			$("#btn1").on("click",function(){				
				$("h1").fadeOut(1000);				
			});
			
			//2. <button id="btn2">fadeIn</button> 요소를 선택해서 'click' 이벤트 등록하고 
			//   'click' 이벤트가 발생하면  <h1>내용</h1>요소를 선택해서 1초만에 점점 선명해 지면서 노출되게 하는 효과 적용
			//참고. fadeIn메소드 사용		 
			$("#btn2").on("click", ()=>{ $("h1").fadeIn(1000)  });
			
			//3. <button id="btn3">fadeToggle</button>요소를 선택해서 'click' 이벤트 등록하고
			//	 사이트 이용자가 'click'이벤트를 발생시키면? 이벤트 핸들러함수가 실행되어 
			//   선택한 <h1>내용</h1>요소가 숨겨져 있으면? 1초만에 점점 선명해 지면서 노출되게 효과를 주고
			//   선택한 <h1>내용</h1>요소가 노출되어 있으면? 1초만에 점점 투명해 지면서 숨겨지게 하는 효과를 적용
			//참고. fadeToggle메소드 사용
			$("#btn3").click(()=>{  $("h1").fadeToggle(1000)  });
*/			
			
			//1.2.3.  <div class="btn-group"></div> 부모요소를 먼저 선택해 오고 
			//		  div 안에 만들어져 있는 모든자식 <button>요소들을 최종선택해  'click' 이벤트를 모두 등록 합니다.
			$(".btn-group").on("click","button", function(){
				
				//'click' 이벤트가 발생한 <button id="btn1">자식요소 하나만 선택해서 
				//선택한 <button id="btn1">자식요소의 id속성에 설정된 btn1값을 얻는다.
				//얻는이유 : 3개의 <button>요소 중 사이트 이용자가 어떤 button요소를 클릭했는지 알아내기 위함
				let id = $(this).attr("id");
				
				//조건1. <button id="btn1">fadeOut</button> 을 클릭한 경우 
				if(id === "btn1"){
		 			
					$("h1").fadeOut(1000);//<h1>내용</h1>요소를 선택해서 1초만에 점점 투명해지면서 숨기는 효과 적용
				
				}else if(id === "btn2"){  //조건2. <button id="btn2">fadeIn</button> 을 클릭한 경우 
					 
					$("h1").fadeIn(1000); //<h1>내용</h1>요소를 선택해서 1초만에 점점 선명해지면서 노출되게 효과 적용
				
				}else{   //조건3. <button id="btn3">fadeToggle</button>을 클릭한 경우 
					
					//<h1>내용</h1>요소를 선택해서 숨겨져 있으면 1초만에 점점 선명해지면서 노출되게 효과를 적용하고
					//선택한 <h1>내용</h1>요소가 노출되어 있으면 1초만에 점점 투명해지면서 숨기게 하는 효과를 적용하자
					$("h1").fadeToggle(1000);
					
				}
			});		
			
		});
	</script>
</head>
<body>
	<div class="btn-group">
		<button id="btn1">fadeOut</button>
		<button id="btn2">fadeIn</button>
		<button id="btn3">fadeToggle</button>
	</div>
	<h1>내용</h1>



</body>
</html>
