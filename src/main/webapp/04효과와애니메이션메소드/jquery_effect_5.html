<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
	
	<style>
		h1{  width:300px;  height:200px;  background-color: yellow; } 
	</style> 
	
	<script src="http://code.jquery.com/jquery-latest.min.js"></script>
	<script type="text/javascript">
		$(function(){
			
			//1. <h1>내용</h1> 를 선택해서 h1상수선언후 저장
			const h1 = $("h1");
			
			//2. <button id="btn1">slideUp</button> 선택해서 'click' 이벤트 등록후 
			//   'click' 이벤트가 발생하면 'click'이벤트 처리할 이벤트 핸들러함수 정의 
			$("button:first").on("click", function(){
					//2.1. 'click' 이벤트 처리할 내용
					//		=>  <h1>내용</h1>요소 영역을 1초만에 위로 접으면서 숨기게 하는 효과 적용
								 h1.slideUp(1000);
			});
			//3. <button id="btn2">slideDown</button> 선택해서 'click' 이벤트 등록후 
			//	  'click' 이벤트가 발생하면 'click'이벤트 처리할 이벤트 핸들러함수 정의 
			$("button:eq(1)").on("click", function(){
					//3.1. 'click' 이벤트 처리할 내용
					//		=>  <h1>내용</h1>요소 영역을 3초만에 아래로 펼쳐지면서 노출되게 하는 효과 적용
								 h1.slideDown(3000);
			});	
			
			//4. <button id="btn3">slideToggle</button> 선택해서 'click'이벤트 등록후 
			//	 사이트 이용자가 이 button을 'click'하는 이벤트를 발생시키면  'click'이벤트 처리할 이벤트 핸들러 함수 정의 
			$("#btn3").click(()=>{
				
				//만약 <h1>내용</h1>요소 영역이 위로 접혀 숨겨져 있으면?  아래로 펼쳐지며 노출되게 하고
				//만약 <h1>내용</h1>요소 영역이 아래로 펼쳐져 있으면? 반대로 위로 접으면서 숨겨지게 하는 효과를 주자
				h1.slideToggle("slow");		
				
			});
				
		});
	</script>
	
</head>
<body>
	<button id="btn1">slideUp</button>
	<button id="btn2">slideDown</button>
	<button id="btn3">slideToggle</button>
	<h1>내용</h1>
	
	
	
	
	
	
	
</body>
</html>
